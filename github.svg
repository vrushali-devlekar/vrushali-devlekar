name: Fix SVG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create proper SVG
        run: |
          printf '%s\n' \
          '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100">' \
          '<text x="10" y="50" font-size="16">WORKING NOW</text>' \
          '</svg>' > github.svg

      - name: Show file content (debug)
        run: |
          echo "---- SVG CONTENT ----"
          cat github.svg

      - name: Commit & push
        run: |
          git config --global user.name "fix"
          git config --global user.email "fix@test.com"
          git add github.svg
          git commit -m "fix svg" || echo "No changes"
          git push
